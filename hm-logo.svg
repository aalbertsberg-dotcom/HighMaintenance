<svg viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="High Maintenance Hair Salon">
  <!-- Dark outer ring -->
  <circle cx="110" cy="110" r="109" fill="#1a1510"/>
  <!-- White inner circle -->
  <circle cx="110" cy="110" r="96" fill="#ffffff"/>
  <!-- H letter — solid fill, no gradient (required for img src rendering) -->
  <text x="18" y="160"
        font-family="Georgia,'Book Antiqua',Palatino,serif"
        font-size="128" font-weight="bold"
        fill="#B8913A">H</text>
  <!-- M letter -->
  <text x="103" y="160"
        font-family="Georgia,'Book Antiqua',Palatino,serif"
        font-size="128" font-weight="bold"
        fill="#B8913A">M</text>
  <!-- HAIR SALON label -->
  <text x="110" y="125"
        font-family="Georgia,'Book Antiqua',Palatino,serif"
        font-size="12" fill="#B8913A"
        text-anchor="middle" letter-spacing="4">HAIR SALON</text>
</svg>
